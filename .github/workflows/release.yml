name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cpp:
    name: C++ release build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Write version from tag
        run: echo "${GITHUB_REF_NAME#v}" > VERSION

      - name: Configure
        run: cmake -B build -DBUILD_TESTING=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build --prefix install

      - name: Package
        run: tar czf maintenance_state_store-cpp-${{ github.ref_name }}.tar.gz -C install .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: maintenance_state_store-cpp-${{ github.ref_name }}.tar.gz

  python:
    name: Python release build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Write version from tag
        run: echo "${GITHUB_REF_NAME#v}" > VERSION

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        run: python -m build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
