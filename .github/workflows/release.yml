name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  python:
    name: Python release build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Write version from tag
        run: |
          echo "${GITHUB_REF_NAME#v}" > VERSION
          sed -i "s|<version>.*</version>|<version>${GITHUB_REF_NAME#v}</version>|" package.xml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        run: python -m build

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
