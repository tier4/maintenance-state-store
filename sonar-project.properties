sonar.organization=tier4
sonar.projectKey=tier4_maintenance-state-store
sonar.python.coverage.reportPaths=test_result/coverage.xml
sonar.sources=src,python
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.10,3.11,3.12,3.13,3.14
sonar.qualitygate.wait=true

# C++ analysis requires a compilation database; the sonar job runs Python-only.
# C++ static analysis is handled separately by the lint-cpp (clang-tidy) job.
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
